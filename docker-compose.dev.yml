version: "3.10"
services:
  web:
    build: .
    image: aapq/photoshnaya_bot:latest
    environment:
      ps_url: "postgresql+psycopg://postgres:postgres@db:5432/postgres"
      testps_url: "postgresql+psycopg://postgres:postgres@db:5432/postgres"
      token: $token
      FEATURE_GO_LEADERBOARDS: ${FEATURE_GO_LEADERBOARDS:-false}
      FEATURE_GO_VOTE_FLOW: ${FEATURE_GO_VOTE_FLOW:-false}
      GO_BRIDGE_BASE_URL: "http://go-bot:8080"
      GO_BRIDGE_TIMEOUT_MS: ${GO_BRIDGE_TIMEOUT_MS:-800}
    depends_on:
      db:
        condition: service_healthy
      go-bot:
        condition: service_started
  go-bot:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: aapq/photoshnaya_go_bridge:latest
    environment:
      ps_url: "postgres://postgres:postgres@db:5432/postgres"
      MIGRATIONS_ENV: ${MIGRATIONS_ENV:-stage}
      GO_BRIDGE_HTTP_ADDR: ${GO_BRIDGE_HTTP_ADDR:-:8080}
      GO_BRIDGE_HTTP_TIMEOUT_MS: ${GO_BRIDGE_HTTP_TIMEOUT_MS:-2000}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:15.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 1s
      timeout: 5s
      retries: 5
  redis:
    image: "redis:alpine"
    restart: always
    ports:
      - "6379:6379"
    volumes:
     - $PWD/redis-data:/var/lib/redis
    environment:
     - REDIS_REPLICATION_MODE=master
