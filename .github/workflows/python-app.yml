# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install uv and sync dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv==0.5.5
        uv sync --frozen --extra dev
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uv run flake8 . --exclude=.venv,.uv-cache --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        uv run flake8 . --exclude=.venv,.uv-cache --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Prepare test env file
      run: cp .env.example .env
    - name: Run tests
      run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from web
    - name: Tear down test stack
      if: always()
      run: docker compose -f docker-compose.test.yml down -v --remove-orphans
