services:
  db:
    image: postgres:14
    container_name: photoshnaya-db
    restart: unless-stopped
    env_file:
      - ./postgres.env
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - photoshnaya_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wrk -d photo"]
      interval: 10s
      timeout: 5s
      retries: 10

  go-api:
    image: ${GO_API_IMAGE_REPOSITORY:-aapq/photoshnaya_go_api}:${GO_API_IMAGE_TAG:-latest}
    container_name: photoshnaya-go-api
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./app/.env
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ${IMAGE_REPOSITORY:-aapq/photoshnaya_bot}:${IMAGE_TAG:-latest}
    container_name: photoshnaya-web
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./app/.env
    depends_on:
      db:
        condition: service_healthy
      go-api:
        condition: service_healthy

volumes:
  photoshnaya_pg_data:
