version: "3.10"
services:
  web:
    build: .
    image: aapq/photoshnaya_bot:latest
    environment:
      testps_url: "postgresql+psycopg://postgres:postgres@db:5432/postgres"
      FEATURE_GO_LEADERBOARDS: "false"
      FEATURE_GO_VOTE_FLOW: "false"
      GO_BRIDGE_BASE_URL: "http://go-bot:8080"
      GO_BRIDGE_TIMEOUT_MS: "800"
    command: bash -c "cd app && pytest tests -v"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:15.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 1s
      timeout: 5s
      retries: 5
